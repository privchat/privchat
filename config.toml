# PrivChat Server 配置文件
# 此文件由 privchat-server --generate-config 生成
# 网关：[gateway] 与 gateway.listeners；文件：[file] 含 server_port / server_api_base_url

[database]
# url = "postgres://user:password@localhost:5432/privchat"
max_connections = 20
min_connections = 5
acquire_timeout_seconds = 10
idle_timeout_seconds = 600
max_lifetime_seconds = 1800
statement_timeout_ms = 5000

[gateway]
max_connections = 2000
connection_timeout = 300
heartbeat_interval = 60
handler_max_inflight = 2000

# 账号体系归属。BUILTIN = server 内置注册/登录/refresh；
# PLATFORM = 账号托管于 privchat platform（如 privchat-application），
# server 端用户面 RPC（account/auth/login | account/user/register | account/auth/refresh）一律 forbidden。
# 也可通过 env 覆盖：PRIVCHAT_ACCOUNT_MODE=BUILTIN | PLATFORM
[account]
mode = "BUILTIN"

[[gateway.listeners]]
protocol = "tcp"
host = "0.0.0.0"
port = 9001

[[gateway.listeners]]
protocol = "quic"
host = "0.0.0.0"
port = 9001

[[gateway.listeners]]
protocol = "websocket"
host = "0.0.0.0"
port = 9080
path = "/gate"
compression = true

[cache]
l1_max_memory_mb = 256
l1_ttl_secs = 3600

[cache.redis]
url = "redis://127.0.0.1:6379"
pool_size = 50
min_idle = 10
connection_timeout = 5
command_timeout_ms = 5000
idle_timeout = 300

[cache.online_status]
timeout_seconds = 300
cleanup_interval_seconds = 60

[admin]
port = 9090
# master_key = "your-secret-key"  # 也可通过环境变量 SERVICE_MASTER_KEY 设置

# 统一 token 配置（HTTP API + IM RPC 同一签发/验证路径）。
# algorithm: "RS256" 或 "HS256"
#   - RS256: 需配 private_key_path / public_key_path（PEM）；JWKS 端点暴露公钥
#   - HS256: 需配 secret（对称密钥）；JWKS 端点返 503
# kid 在两种算法下都写，便于轮换审计；RS256 还会写到 JWT header.
# 也可通过 env 覆盖：PRIVCHAT_JWT_ALGORITHM / PRIVCHAT_JWT_SECRET /
#   PRIVCHAT_JWT_PRIVATE_KEY_PATH / PRIVCHAT_JWT_PUBLIC_KEY_PATH / PRIVCHAT_JWT_KID /
#   PRIVCHAT_JWT_ACCESS_TTL_SECS / PRIVCHAT_JWT_REFRESH_TTL_SECS
[auth.jwt]
algorithm        = "RS256"
private_key_path = "./.local/keys/jwt/v1.pem"
public_key_path  = "./.local/keys/jwt/v1.pub.pem"
kid              = "v1"
access_ttl_secs  = 3600
refresh_ttl_secs = 2592000
issuer           = "privchat-server"
default_audience = ["privchat-application", "privchat-server"]

[room]
subscribe_history = true
subscribe_history_limit = 30
history_ttl_seconds = 86400
max_subscriptions_per_session = 32
max_channel_subscribers_online = 20000

[file]
default_storage_source_id = 0
server_port = 9083
server_api_base_url = "http://127.0.0.1:9083/api/app"

[[file.storage_sources]]
id = 0
storage_type = "local"
storage_root = "./storage/files"
base_url = "http://127.0.0.1:8000"

# 多数据中心示例：再增加 id=1、id=2 等，不同机房设置不同 default_storage_source_id 即可
# [[file.storage_sources]]
# id = 1
# storage_type = "local"
# storage_root = "/data/privchat/files-cn"
# base_url = "https://files-cn.example.com/files"
#
# [[file.storage_sources]]
# id = 2
# storage_type = "local"
# storage_root = "/data/privchat/files-us"
# base_url = "https://files-us.example.com/files"

