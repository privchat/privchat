# server → downstream 统一出站配置（v1.1 起合并 channel_transfer + service_account_event）
# spec: 02-server/SERVER_EVENT_DISPATCH_SPEC §3
# 所有 server emit 都走这里：transfer.requested + bot.followed + bot.unfollowed + ...
# v1 复用同一把 application master key（与 application 端 privchat.conf 的 service_master_key 一致）
[server_event]
application_url = "http://localhost:8080"
application_master_key = "your_service_master_key_here"
timeout_ms = 3000

# Room subscribe ticket（spec 02-server/ROOM_CHANNEL_SPEC §4）
# secret 是 HMAC-SHA256 key。生产环境通过 env 覆盖。
# default_kid: 签发用的 key id；和 keys 多 key 一起用做轮换。
[room_ticket]
secret = "dev-room-ticket-secret-please-rotate-in-prod"
default_kid = "v1"
leeway_secs = 30

[logging]
level = "info"
format = "compact"
file = "./logs/server.log"

# ==========================================
# 系统消息配置
# ==========================================
[system_message]
# 是否启用系统消息用户
enabled = true

# 新用户注册时的欢迎消息
welcome_message = """
👋 欢迎使用 Privchat！

这是一个端到端加密的即时通讯系统，您的隐私安全由我们守护。

🔐 主要特性：
• 端到端加密通讯
• 多设备同步
• 离线消息推送
• 文件安全传输

如有任何问题，欢迎随时联系我们！
"""

# 是否在用户注册时自动创建与系统用户的会话
auto_create_channel = true

# 是否在创建会话后自动发送欢迎消息
auto_send_welcome = true

# ==========================================
# 消息配置（撤回时效等）
# ==========================================
[message]
# 普通用户撤回自己消息的时效（秒）。群主/管理员不受此限制。
#   > 0  : 普通用户仅能在发送后该秒数内撤回（例如 172800 = 48 小时）
#   0    : 不限制时效，普通用户任意时间均可撤回自己的消息
recall_time_limit_secs = 0
