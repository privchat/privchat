[logging]
level = "info"
format = "compact"
file = "./logs/server.log"

# ==========================================
# 系统消息配置
# ==========================================
[system_message]
# 是否启用系统消息用户
enabled = true

# 新用户注册时的欢迎消息
welcome_message = """
👋 欢迎使用 Privchat！

这是一个端到端加密的即时通讯系统，您的隐私安全由我们守护。

🔐 主要特性：
• 端到端加密通讯
• 多设备同步
• 离线消息推送
• 文件安全传输

如有任何问题，欢迎随时联系我们！
"""

# 是否在用户注册时自动创建与系统用户的会话
auto_create_channel = true

# 是否在创建会话后自动发送欢迎消息
auto_send_welcome = true
